<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --primary: #5e6ad2;
    --primary-hover: #828fff;
    --primary-focus: #5e69d1;

    --canvas: #010102;
    --surface-1: #0f1011;
    --surface-2: #141516;
    --surface-3: #18191a;

    --secondary-bg: #2b2e34;
    --secondary-hover: #353941;
    --secondary-border: #43464d;
    --secondary-border-hover: #565b64;

    --hairline: #23252a;
    --hairline-strong: #34343a;

    --ink: #f7f8f8;
    --ink-muted: #d0d6e0;
    --ink-subtle: #8a8f98;
    --ink-tertiary: #62666d;

    --success: #27a644;
    --error: #ef4444;
  }

  body {
    margin: 0;
    font-family:
      Inter,
      "SF Pro Display",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      system-ui,
      sans-serif;

    background: var(--canvas);
    color: var(--ink);
  }

  .app {
    max-width: 520px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 24px 18px 36px;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .start-admin-bar {
    display: flex;
    justify-content: flex-end;
    min-height: 38px;
  }

  .admin-link-btn {
    width: auto;
    min-width: 74px;
    min-height: 36px;
    height: 36px;
    margin: 0;
    padding: 0 12px;
    font-size: 13px;
  }

  h1 {
    text-align: center;
    margin: 32px 0 28px;
    font-size: 40px;
    font-weight: 600;
    line-height: 1.12;
    letter-spacing: -1px;
    color: var(--ink);
  }

  label {
    display: block;
    margin: 18px 0 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-subtle);
  }

  input,
  select {
    width: 100%;
    height: 48px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 16px;
    background: var(--surface-1);
    color: var(--ink);
    outline: none;
  }

  input:focus,
  select:focus {
    border-color: var(--primary-focus);
    box-shadow: 0 0 0 3px rgba(94,106,210,0.22);
  }

  input::placeholder {
    color: var(--ink-tertiary);
  }

  /* ===== Primary Button ===== */

  button {
    width: 100%;
    min-height: 48px;

    border: 1px solid transparent;
    border-radius: 8px;

    background: var(--primary);
    color: white;

    font-size: 14px;
    font-weight: 500;

    margin-top: 12px;
    cursor: pointer;

    transition: all .15s ease;
  }

  button:hover {
    background: var(--primary-hover);
  }

  button:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  /* ===== Secondary Button ===== */

  .secondary,
  .sub-btn {
    background: var(--secondary-bg);
    color: var(--ink);
    border: 1px solid var(--secondary-border);
  }

  .secondary:hover,
  .sub-btn:hover {
    background: var(--secondary-hover);
    border-color: var(--secondary-border-hover);
  }

  .hidden {
    display: none;
  }

  /* ===== Top Area ===== */

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--hairline);
  }

  .top-buttons {
    display: flex;
    gap: 8px;
  }

  .top p {
    margin: 0;
    font-size: 14px;
    color: var(--ink-subtle);
  }

  .top button {
    width: auto;
    min-width: 90px;
    height: 38px;
    min-height: 38px;
    margin: 0;
  }

  /* ===== Menu ===== */

  .menu-grid {
    display: grid;
    gap: 12px;
    margin-top: 12px;
  }

  .quiz-type-buttons {
    display: grid;
    gap: 10px;
    margin-top: 16px;
  }

  .quiz-type-btn {
    background: var(--secondary-bg);
    color: var(--ink);
    border: 1px solid var(--secondary-border);
  }

  .quiz-type-btn:hover {
    background: var(--secondary-hover);
  }

  .quiz-type-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  /* ===== Cards ===== */

  .card,
  .quiz-card,
  .summary-box {
    background: var(--surface-1);

    border: 1px solid var(--hairline);
    border-radius: 12px;

    padding: 24px;
    text-align: center;

    margin: 20px 0;
  }

  .summary-box h3 {
    margin-top: 0;
    font-size: 22px;
    font-weight: 500;
  }

  /* ===== Study ===== */

  .word {
    font-size: 44px;
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -1px;
    margin-bottom: 18px;
    color: var(--ink);
    word-break: break-word;
  }

  .meaning {
    font-size: 24px;
    font-weight: 500;
    color: var(--ink-muted);
  }

  /* ===== Quiz ===== */

  .quiz-type {
    display: inline-block;

    padding: 4px 10px;
    border-radius: 9999px;

    background: var(--surface-2);
    color: var(--ink-muted);

    font-size: 12px;
    margin-bottom: 16px;
  }

  .quiz-question {
    font-size: 30px;
    font-weight: 600;
    line-height: 1.18;

    margin-bottom: 22px;
    min-height: 64px;

    color: var(--ink);
  }

  .choice-list {
    display: grid;
    gap: 12px;
    margin-top: 18px;
  }

  /* ===== Multiple Choice ===== */

  .choice-btn {
    background: var(--secondary-bg);
    color: var(--ink);

    border: 1px solid var(--secondary-border);
    border-radius: 8px;

    text-align: left;
  }

  .choice-btn:hover {
    background: var(--secondary-hover);
    border-color: var(--secondary-border-hover);
  }

  .choice-btn.correct {
    background: rgba(39,166,68,0.18);
    border-color: var(--success);
  }

  .choice-btn.wrong {
    background: rgba(239,68,68,0.18);
    border-color: var(--error);
  }

  /* ===== Result ===== */

  .result {
    margin-top: 16px;
    font-size: 18px;
    font-weight: 600;
    min-height: 30px;
  }

  .correct {
    color: var(--success);
  }

  .wrong {
    color: var(--error);
  }

  /* ===== Wrong Note ===== */

  .wrong-item {
    padding: 14px;

    border-radius: 10px;
    border: 1px solid var(--hairline);

    background: var(--surface-2);

    margin-top: 10px;

    text-align: left;
    font-size: 14px;
    line-height: 1.5;
  }

  .wrong-item button {
    height: 40px;
    min-height: 40px;

    margin-top: 8px;

    background: var(--secondary-bg);
    color: var(--ink);

    border: 1px solid var(--secondary-border);
  }

  .wrong-item button:hover {
    background: var(--secondary-hover);
    border-color: var(--secondary-border-hover);
  }

  /* ===== Summary ===== */

  #minuteSummary,
  #minuteDetailText,
  #finalResultText {
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink-muted);
  }

  .request-box {
    text-align: left;
  }

  .request-box h3 {
    text-align: center;
  }

  .request-header,
  .request-row {
    display: grid;
    grid-template-columns: 1fr 56px 76px;
    gap: 8px;
    align-items: center;
  }

  .request-header {
    margin: 8px 0;
    color: var(--ink-subtle);
    font-size: 12px;
    font-weight: 600;
  }

  .request-list {
    display: grid;
    gap: 8px;
    color: var(--ink-muted);
    font-size: 14px;
    line-height: 1.4;
  }

  .request-row {
    padding: 10px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: var(--surface-2);
  }

  .request-status {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 9999px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
  }

  .request-status.pending {
    color: var(--ink-muted);
    background: var(--secondary-bg);
  }

  .request-status.approved {
    color: var(--success);
    background: rgba(39,166,68,0.16);
  }

  .request-status.rejected {
    color: var(--error);
    background: rgba(239,68,68,0.16);
  }

  .admin-request-list {
    display: grid;
    gap: 10px;
    margin-top: 12px;
  }

  .admin-request-row {
    display: grid;
    gap: 10px;
    padding: 12px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: var(--surface-2);
  }

  .admin-request-info {
    color: var(--ink-muted);
    font-size: 14px;
    line-height: 1.45;
  }

  .admin-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .admin-actions button {
    min-height: 40px;
    margin: 0;
  }

  @media (max-width: 480px) {
    .app {
      padding: 20px 14px 32px;
    }

    h1 {
      font-size: 34px;
    }

    .word {
      font-size: 38px;
    }

    .meaning {
      font-size: 22px;
    }

    .quiz-question {
      font-size: 26px;
    }

    .card,
    .quiz-card,
    .summary-box {
      padding: 20px;
    }
  }
</style>
